name: CI Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout the application code
    - name: Checkout Application Code
      uses: actions/checkout@v4

    # Step 2: Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Step 3: Log in to Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Step 4: Build, tag, and push image to Amazon ECR
    - name: Build and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: payment-service
        IMAGE_TAG: ${{ github.sha }} # Uses the unique git commit hash as image tag
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Step 5: GitOps Magic - Checkout & Update Manifest Repo
    - name: Update GitOps Manifest Token Tag
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Configure Git Configuration
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Clone the GitOps Repository using the PAT
        git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/payment-service-gitops.git
        cd payment-service-gitops
        
        # We will assume a values.yaml file structure has 'image.tag'
        # This sed command replaces the tag dynamically
        sed -i "s/tag: .*/tag: \"$IMAGE_TAG\"/g" values.yaml
        
        # Commit and push changes back to GitOps repo
        git add values.yaml
        git commit -m "Automated CI: Update payment-service image tag to $IMAGE_TAG"
        git push origin main