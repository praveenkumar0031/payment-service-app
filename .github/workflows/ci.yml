name: CI Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout the application code
    - name: Checkout Application Code
      uses: actions/checkout@v4

    # Step 2: Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Step 3: Log in to Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Step 4: Build, tag, and push image to Amazon ECR
    - name: Build and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: payment-service
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Step 5: GitOps - Checkout & Update Manifest Repo
    - name: Update GitOps Manifest Token Tag
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Configure Git Profile
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. Clone using the explicit GH_PAT secret token mapped into the URL format
        git clone https://$GH_PAT@github.com/${{ github.repository_owner }}/payment-service-gitops.git
        cd payment-service-gitops
        
        # Modify the Helm values file directly via exact relative chart pathing
        sed -i "s/tag: .*/tag: \"$IMAGE_TAG\"/g" charts/payment-service/values.yaml
        
        # Stage, commit, and securely force upstream tracking deployment
        git add charts/payment-service/values.yaml
        git commit -m "Automated CI: Update payment-service image tag to $IMAGE_TAG"
        git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/payment-service-gitops.git main